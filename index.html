<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Сила Слова</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root { color-scheme: light dark; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    margin: 0; padding: 20px; background: var(--tg-theme-bg-color, #fff); color: var(--tg-theme-text-color, #111); }
  h1 { font-size: 20px; margin: 0 0 16px; }
  .card { border: 1px solid rgba(128,128,128,.25); border-radius: 14px; padding: 16px; margin-bottom: 12px; }
  .muted { opacity: .6; font-size: 14px; }
  .big { font-size: 28px; font-weight: 700; }
  .row { display: flex; justify-content: space-between; margin: 6px 0; }
  .empty { text-align: center; padding: 40px 16px; opacity: .7; }
  button { width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 16px; font-weight: 600;
    background: var(--tg-theme-button-color, #2481cc); color: var(--tg-theme-button-text-color, #fff); margin-top: 10px; }
</style>
</head>
<body>
  <h1>Сила Слова</h1>
  <div id="app"><div class="empty">Загрузка…</div></div>

<script>
  const tg = window.Telegram?.WebApp;
  tg?.ready();
  tg?.expand();

  async function load() {
    const initData = tg?.initData || "";
    const app = document.getElementById("app");
    if (!initData) {
      app.innerHTML = '<div class="empty">Открой это через кнопку в боте — вне Telegram приложение не работает.</div>';
      return;
    }
    try {
      const r = await fetch("https://mparfxpddlkfuixminnx.supabase.co/functions/v1/miniapp/status", { headers: { "X-Init-Data": initData } });
      const data = await r.json();
      if (!r.ok) { app.innerHTML = '<div class="empty">Не удалось проверить — открой заново через бота.</div>'; return; }
      if (!data.bet) {
        app.innerHTML = '<div class="empty">Активной ставки нет.<br><br>Вернись в бота и дай слово — карточка появится здесь.</div>';
        return;
      }
      const b = data.bet;
      const left = Math.max(0, b.duration_days - b.day_n);
      app.innerHTML = `
        <div class="card">
          <div class="muted">Карточка #${b.id}</div>
          <div class="big">${b.goal}</div>
          <div class="row"><span>День</span><span>${b.day_n} из ${b.duration_days}</span></div>
          <div class="row"><span>До финиша</span><span>${left} дн.</span></div>
          <div class="row"><span>Режим</span><span>${b.mode === "public" ? "Публично" : "Лично"}</span></div>
        </div>
        <div class="muted" style="text-align:center">Отправка отчёта и мастер новой ставки — скоро прямо здесь.</div>
      `;
    } catch (e) {
      app.innerHTML = '<div class="empty">Ошибка соединения. Попробуй ещё раз.</div>';
    }
  }
  load();
</script>
</body>
</html>
