<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Сила Слова</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    margin: 0; padding: 20px; background: var(--tg-theme-bg-color, #fff); color: var(--tg-theme-text-color, #111); }
  h1 { font-size: 20px; margin: 0 0 16px; }
  h2 { font-size: 19px; margin: 0 0 14px; }
  .card { border: 1px solid rgba(128,128,128,.25); border-radius: 14px; padding: 16px; margin-bottom: 12px; }
  .muted { opacity: .6; font-size: 14px; }
  .big { font-size: 24px; font-weight: 700; margin: 4px 0; }
  .row { display: flex; justify-content: space-between; gap: 12px; margin: 6px 0; font-size: 15px; }
  .row span:first-child { opacity: .6; }
  .row span:last-child { text-align: right; }
  .empty { text-align: center; padding: 40px 16px; opacity: .7; }
  button { width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 16px; font-weight: 600;
    background: var(--tg-theme-button-color, #2481cc); color: var(--tg-theme-button-text-color, #fff); margin-top: 10px; }
  .btn-secondary { background: rgba(128,128,128,.15); color: var(--tg-theme-text-color, #111); }
  .btn-row { display: flex; gap: 10px; }
  .btn-row button { margin-top: 16px; }
  .opt { border: 1px solid rgba(128,128,128,.25); border-radius: 14px; padding: 14px 16px; margin-bottom: 10px; cursor: pointer; }
  .opt b { display: block; font-size: 16px; margin-bottom: 3px; }
  input[type="text"], input[type="date"], textarea {
    width: 100%; padding: 12px 14px; border-radius: 12px; border: 1px solid rgba(128,128,128,.35);
    background: transparent; color: var(--tg-theme-text-color, #111); font-size: 16px; font-family: inherit; }
  textarea { min-height: 70px; resize: vertical; }
  .chips { display: flex; gap: 8px; }
  .chip { flex: 1; text-align: center; padding: 10px 6px; border-radius: 10px; border: 1px solid rgba(128,128,128,.35);
    cursor: pointer; font-size: 14px; }
  .err { color: #e5484d; font-size: 13px; min-height: 18px; margin-top: 6px; }
  .progress { height: 4px; border-radius: 2px; background: rgba(128,128,128,.2); overflow: hidden; margin-bottom: 6px; }
  .progress-fill { height: 100%; background: var(--tg-theme-button-color, #2481cc); transition: width .2s; }
  .footer-nav { display: flex; justify-content: center; gap: 20px; margin-top: 24px; font-size: 14px; }
  .footer-nav a { opacity: .6; text-decoration: underline; cursor: pointer; }
  .bet-card { border: 1px solid rgba(128,128,128,.25); border-radius: 14px; padding: 14px 16px; margin-bottom: 10px; cursor: pointer; }
  .bet-card .top { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
  .bet-card .goal { font-size: 16px; font-weight: 600; }
  .bet-card .badge { font-size: 12px; opacity: .6; white-space: nowrap; }
  .bet-card .meta { margin-top: 6px; font-size: 13px; opacity: .65; }
  .persona-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 10px 0 4px; }
  .persona-opt { border: 1px solid rgba(128,128,128,.3); border-radius: 12px; padding: 12px 10px; text-align: center;
    font-size: 14px; cursor: pointer; }
  .persona-opt.active { border-color: var(--tg-theme-button-color, #2481cc); border-width: 2px; font-weight: 700; }
</style>
</head>
<body>
  <h1>Сила Слова</h1>
  <div id="app"><div class="empty">Загрузка…</div></div>

<script>
  const tg = window.Telegram?.WebApp;
  tg?.ready();
  tg?.expand();

  const API = "https://mparfxpddlkfuixminnx.supabase.co/functions/v1/miniapp";
  const initData = tg?.initData || "";
  const TYPES = { result: "Результат", habit: "Привычка", quit: "Отказ" };
  const PERSONAS = { confucius: "Конфуций", arnold: "Фитнес Арнольд", zina: "Баба Зина 🔞", angela: "Анджела Фокс" };

  let ctx = { user: null, bets: [], draft: {}, step: 0 };

  function esc(s) { return (s || "").replace(/[&<>]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c])); }
  function escAttr(s) { return esc(s).replace(/"/g, "&quot;"); }
  function emptyMsg(t) { return '<div class="empty">' + t + "</div>"; }
  function closeApp() { tg?.close(); }
  window.closeApp = closeApp;

  async function api(path, opts) {
    opts = opts || {};
    const isForm = opts.body instanceof FormData;
    const headers = { "X-Init-Data": initData, ...(opts.headers || {}) };
    if (!isForm) headers["Content-Type"] = "application/json";
    return fetch(API + path, { ...opts, headers });
  }

  async function refreshStatus() {
    try {
      const r = await api("/status");
      const data = await r.json();
      if (r.ok) { ctx.user = data.user; ctx.bets = data.bets || []; }
    } catch (e) { /* молча — следующий рендер попробует снова */ }
  }

  async function boot() {
    const app = document.getElementById("app");
    if (!initData) { app.innerHTML = emptyMsg("Открой это через кнопку в боте — вне Telegram приложение не работает."); return; }
    try {
      const r = await api("/status");
      const data = await r.json();
      if (!r.ok) { app.innerHTML = emptyMsg("Не удалось проверить — открой заново через бота."); return; }
      ctx.user = data.user; ctx.bets = data.bets || [];
      renderHome();
    } catch (e) {
      app.innerHTML = emptyMsg("Ошибка соединения. Попробуй ещё раз.");
    }
  }

  function footerNav() {
    return '<div class="footer-nav"><a onclick="showInfo()">Как это работает</a><a onclick="closeApp()">Поддержка — в чате</a></div>';
  }
  window.showInfo = function () {
    document.getElementById("app").innerHTML =
      '<div class="card">' +
      "<p>Люди не достигают целей не потому, что не знают как. А потому, что за слив ничего не будет. Пообещал — забыл — никто не заметил.</p>" +
      "<p>1. Записываешь видео: «Даю слово, что…»<br>2. Ставишь на кон своё слово<br>3. Отчитываешься каждый день<br>4. Дошёл — герой. Слился — все узнают, чего стоит твоё слово.</p>" +
      "<p>Пропустил отчёт — слово не сдержано. Без запасных дней. Поэтому и работает.</p>" +
      "</div><button onclick=\"renderHome()\">Назад</button>";
  };

  window.renderHome = function () {
    const app = document.getElementById("app");
    if (!ctx.user || !ctx.user.age) {
      app.innerHTML = emptyMsg("Сначала пройди быстрый старт в чате бота — напиши боту /start.") + footerNav();
      return;
    }
    const bets = ctx.bets || [];
    let html = "";
    if (bets.length) {
      html += '<div class="muted" style="margin-bottom:10px">' +
        (bets.length === 1 ? "Твоя активная ставка:" : "Твои активные ставки (" + bets.length + "):") + "</div>";
      html += bets.map(function (b) {
        const left = Math.max(0, b.duration_days - b.day_n);
        return '<div class="bet-card" onclick="openBet(' + b.id + ')">' +
          '<div class="top"><div class="goal">' + esc(b.goal) + '</div>' +
          '<div class="badge">#' + b.id + "</div></div>" +
          '<div class="meta">' + TYPES[b.type] + " · " + (b.mode === "public" ? "Публично" : "Лично") +
          " · День " + b.day_n + " из " + b.duration_days + " · ещё " + left + " дн.</div>" +
          '<div class="meta">Персонаж: ' + (PERSONAS[b.persona] || "не выбран") + "</div></div>";
      }).join("");
    } else {
      html += '<div class="empty"><div style="font-size:17px;margin-bottom:4px">Активных ставок нет.</div>' +
        '<div class="muted">Готов проверить себя?</div></div>';
    }
    html += '<button onclick="startWizard()">🚀 Дать слово</button>' + footerNav();
    app.innerHTML = html;
  };

  // ---------- карточка ставки: детали, отчёт, персонаж ----------
  window.openBet = function (id) {
    ctx.selectedBetId = id;
    renderBetDetail();
  };

  window.renderBetDetail = function () {
    const app = document.getElementById("app");
    const b = (ctx.bets || []).find(function (x) { return x.id === ctx.selectedBetId; });
    if (!b) { renderHome(); return; }
    const left = Math.max(0, b.duration_days - b.day_n);
    const personaGrid = Object.keys(PERSONAS).map(function (key) {
      const active = b.persona === key ? " active" : "";
      return '<div class="persona-opt' + active + '" onclick="setPersona(' + b.id + ',\'' + key + '\')">' + PERSONAS[key] + "</div>";
    }).join("");
    const stakeLine = b.stake > 0
      ? (b.stake_paid ? b.stake + " ⭐ (оплачено)" : b.stake + " ⭐ (не оплачено)")
      : "твоё слово";
    app.innerHTML =
      '<div class="card"><div class="muted">Карточка #' + b.id + "</div>" +
      '<div class="big">' + esc(b.goal) + "</div>" +
      '<div class="row"><span>Тип</span><span>' + TYPES[b.type] + "</span></div>" +
      '<div class="row"><span>Режим</span><span>' + (b.mode === "public" ? "Публично" : "Лично") + "</span></div>" +
      '<div class="row"><span>День</span><span>' + b.day_n + " из " + b.duration_days + "</span></div>" +
      '<div class="row"><span>До финиша</span><span>' + left + " дн.</span></div>" +
      '<div class="row"><span>На кону</span><span>' + stakeLine + "</span></div></div>" +
      (b.stake > 0 && !b.stake_paid ? '<button onclick="payStake(' + b.id + "," + b.stake + ')">Оплатить ' + b.stake + " ⭐</button>" : "") +
      '<button onclick="sendReport(' + b.id + ')">Отправить отчёт</button>' +
      '<div class="muted" style="margin-top:18px">Сменить персонажа:</div>' +
      '<div class="persona-grid">' + personaGrid + "</div>" +
      '<div id="bet-msg" class="muted" style="text-align:center;margin-top:10px"></div>' +
      '<button class="btn-secondary" onclick="renderHome()">К списку ставок</button>';
  };

  window.sendReport = async function (betId) {
    const msgEl = document.getElementById("bet-msg");
    if (msgEl) msgEl.textContent = "Открываю чат…";
    try {
      const r = await api("/report", { method: "POST", body: JSON.stringify({ bet_id: betId }) });
      if (!r.ok) { if (msgEl) msgEl.textContent = "Не получилось. Попробуй ещё раз."; return; }
      closeApp();
    } catch (e) {
      if (msgEl) msgEl.textContent = "Ошибка соединения. Попробуй ещё раз.";
    }
  };

  window.payStake = async function (betId, stake) {
    const msgEl = document.getElementById("bet-msg");
    if (msgEl) msgEl.textContent = "Открываю оплату…";
    try {
      const r = await api("/invoice", { method: "POST", body: JSON.stringify({ bet_id: betId, stake: stake }) });
      const data = await r.json();
      if (!r.ok || !data.invoice_link) { if (msgEl) msgEl.textContent = "Не получилось создать оплату."; return; }
      if (!tg || typeof tg.openInvoice !== "function") { if (msgEl) msgEl.textContent = "Оплата недоступна в этой версии Telegram."; return; }
      tg.openInvoice(data.invoice_link, function (status) {
        if (status === "paid") {
          const b = (ctx.bets || []).find(function (x) { return x.id === betId; });
          if (b) b.stake_paid = true;
          renderBetDetail();
        } else {
          const el = document.getElementById("bet-msg");
          if (el) el.textContent = "Оплата не завершена.";
        }
      });
    } catch (e) {
      if (msgEl) msgEl.textContent = "Ошибка соединения.";
    }
  };

  window.setPersona = async function (betId, persona) {
    const msgEl = document.getElementById("bet-msg");
    if (msgEl) msgEl.textContent = "Сохраняю…";
    try {
      const r = await api("/persona", { method: "POST", body: JSON.stringify({ bet_id: betId, persona: persona }) });
      if (!r.ok) { if (msgEl) msgEl.textContent = "Не получилось сохранить."; return; }
      const b = (ctx.bets || []).find(function (x) { return x.id === betId; });
      if (b) b.persona = persona;
      renderBetDetail();
    } catch (e) {
      if (msgEl) msgEl.textContent = "Ошибка соединения.";
    }
  };

  // ---------- мастер ставки ----------
  const MAX_VIDEO_BYTES = 20 * 1024 * 1024;
  window.startWizard = function () {
    ctx.draft = { mode: null, type: null, goal: "", point_a: "", point_b: "", days: null, _date: "", witness: "", videoFile: null, videoPreviewUrl: null, stake: 0 };
    ctx.step = 0;
    renderWizard();
  };
  function stepList() {
    const s = ["mode", "type", "goal", "pointA", "pointB", "duration"];
    if (ctx.draft.type === "quit") s.push("witness");
    s.push("video", "stake", "review");
    return s;
  }
  function curName() { return stepList()[ctx.step]; }

  window.renderWizard = function () {
    const app = document.getElementById("app");
    const d = ctx.draft;
    const name = curName();
    let body = "";
    let showNext = true;

    if (name === "mode") {
      showNext = false;
      body = "<h2>Как даёшь слово?</h2>" +
        '<div class="opt" onclick="pick(\'mode\',\'public\')"><b>Публично</b><div class="muted">Заявление уходит в группу. На тебя смотрят, тебя поддерживают.</div></div>' +
        '<div class="opt" onclick="pick(\'mode\',\'private\')"><b>Лично</b><div class="muted">Только ты и бот. Тихо, но по-настоящему.</div></div>';
    } else if (name === "type") {
      showNext = false;
      body = "<h2>На что даёшь слово?</h2>" +
        '<div class="opt" onclick="pick(\'type\',\'result\')"><b>Результат</b><div class="muted">Конкретная точка: минус 8 кг, накопить 300 000 ₽</div></div>' +
        '<div class="opt" onclick="pick(\'type\',\'habit\')"><b>Привычка</b><div class="muted">Делать регулярно: 100 отжиманий в день</div></div>' +
        '<div class="opt" onclick="pick(\'type\',\'quit\')"><b>Отказ</b><div class="muted">Прекратить: без алкоголя, без сладкого</div></div>';
    } else if (name === "goal") {
      body = "<h2>Цель</h2>" +
        '<div class="muted" style="margin-bottom:10px">Одной фразой с цифрой и сроком. Шаблон: «Хочу … к …».</div>' +
        '<textarea id="f-goal" placeholder="Хочу весить 85 кг к 1 октября">' + esc(d.goal) + "</textarea>" +
        '<div id="f-err" class="err"></div>';
    } else if (name === "pointA") {
      body = "<h2>Точка А</h2>" +
        '<div class="muted" style="margin-bottom:10px">Где ты сейчас? Число или короткое описание. Фото пруфа, если нужно, — потом в чате.</div>' +
        '<input id="f-a" type="text" placeholder="Например: 93 кг" value="' + escAttr(d.point_a) + '">' +
        '<div id="f-err" class="err"></div>';
    } else if (name === "pointB") {
      body = "<h2>Точка Б</h2>" +
        '<div class="muted" style="margin-bottom:10px">Куда идём? Финиш цифрой.</div>' +
        '<input id="f-b" type="text" placeholder="Например: 85 кг" value="' + escAttr(d.point_b) + '">' +
        '<div id="f-err" class="err"></div>';
    } else if (name === "duration") {
      const min = new Date(Date.now() + 3 * 3600e3 + 864e5).toISOString().slice(0, 10);
      body = "<h2>Срок</h2>" +
        '<div class="chips">' +
        '<div class="chip" onclick="pickDays(7)">7 дней</div>' +
        '<div class="chip" onclick="pickDays(14)">14 дней</div>' +
        '<div class="chip" onclick="pickDays(30)">30 дней</div></div>' +
        '<div class="muted" style="margin:12px 0 6px">Или выбери дату:</div>' +
        '<input id="f-date" type="date" min="' + min + '" value="' + d._date + '" onchange="pickDate(this.value)">' +
        (d.days ? '<div class="muted" style="margin-top:8px">' + d.days + " дн." + "</div>" : "") +
        '<div id="f-err" class="err"></div>';
    } else if (name === "witness") {
      body = "<h2>Свидетель</h2>" +
        '<div class="muted" style="margin-bottom:10px">Отказ снаружи не виден. Нужен тот, кто видит тебя каждый день и подтвердит в конце: «Держал(а) слово?»</div>' +
        '<input id="f-w" type="text" placeholder="@username" value="' + escAttr(d.witness) + '">' +
        '<div id="f-err" class="err"></div>';
    } else if (name === "video") {
      const nameStr = (ctx.user && ctx.user.name) || "друг";
      body = "<h2>Видео-клятва</h2>" +
        '<div class="muted" style="margin-bottom:10px">Запиши на камеру или выбери готовое видео: «Я, ' + esc(nameStr) + ', даю слово, что ' + esc(d.goal) + '». От 15 секунд до 2 минут.' +
        (d.mode === "public" ? " Видео будет опубликовано в группе." : " Видео останется между нами.") + "</div>" +
        '<input id="f-video" type="file" accept="video/*" capture="user" onchange="handleVideoFile(this)">' +
        (d.videoPreviewUrl
          ? '<video src="' + d.videoPreviewUrl + '" controls playsinline style="width:100%;border-radius:12px;margin-top:10px"></video>'
          : "") +
        '<div id="f-err" class="err"></div>';
    } else if (name === "stake") {
      body = "<h2>Ставка</h2>" +
        '<div class="muted" style="margin-bottom:10px">Сумма в Stars — сейчас тестовый режим. Символические 1–10 ⭐ дают почувствовать, что на кону не только слово.</div>' +
        '<div class="chips">' +
        '<div class="chip" onclick="pickStake(0)">Без ставки</div>' +
        '<div class="chip" onclick="pickStake(1)">1 ⭐</div>' +
        '<div class="chip" onclick="pickStake(5)">5 ⭐</div>' +
        '<div class="chip" onclick="pickStake(10)">10 ⭐</div></div>' +
        '<div class="muted" style="margin:12px 0 6px">Или своя сумма:</div>' +
        '<input id="f-stake" type="text" inputmode="numeric" placeholder="Например: 25" value="' + (d.stake || "") + '" oninput="onStakeInput(this.value)">' +
        '<div id="stake-note" class="muted" style="margin-top:8px">' + (d.stake ? d.stake + " ⭐ будет списано при подтверждении." : "Пока без ставки — только слово.") + "</div>";
    } else if (name === "review") {
      body = "<h2>Проверь и вперёд</h2>" +
        '<div class="card">' +
        '<div class="row"><span>Режим</span><span>' + (d.mode === "public" ? "Публично" : "Лично") + "</span></div>" +
        '<div class="row"><span>Тип</span><span>' + TYPES[d.type] + "</span></div>" +
        '<div class="row"><span>Цель</span><span>' + esc(d.goal) + "</span></div>" +
        '<div class="row"><span>Точка А</span><span>' + esc(d.point_a) + "</span></div>" +
        '<div class="row"><span>Точка Б</span><span>' + esc(d.point_b) + "</span></div>" +
        '<div class="row"><span>Срок</span><span>' + d.days + " дн.</span></div>" +
        (d.type === "quit" ? '<div class="row"><span>Свидетель</span><span>' + esc(d.witness) + "</span></div>" : "") +
        '<div class="row"><span>Видео</span><span>' + (d.videoFile ? "прикреплено ✓" : "нет") + "</span></div>" +
        '<div class="row"><span>Ставка</span><span>' + (d.stake ? d.stake + " ⭐" : "без ставки") + "</span></div>" +
        "</div>" +
        '<div class="muted" style="text-align:center;margin-bottom:16px">Подтверждаешь — публикуем сразу, не выходя из приложения.</div>';
    }

    const back = ctx.step > 0
      ? '<button class="btn-secondary" onclick="wizBack()">Назад</button>'
      : '<button class="btn-secondary" onclick="renderHome()">Отмена</button>';
    const nextBtn = showNext
      ? '<button onclick="wizNext()">' + (name === "review" ? "Дать слово" : "Далее") + "</button>"
      : "";

    app.innerHTML =
      '<div class="progress"><div class="progress-fill" style="width:' + (((ctx.step + 1) / stepList().length) * 100) + '%"></div></div>' +
      '<div class="muted" style="text-align:center;margin-bottom:16px">Шаг ' + (ctx.step + 1) + " из " + stepList().length + "</div>" +
      body +
      '<div class="btn-row">' + back + nextBtn + "</div>";
  };

  window.pick = function (key, val) { ctx.draft[key] = val; wizNext(); };
  window.pickDays = function (n) {
    const dt = new Date(Date.now() + 3 * 3600e3 + n * 864e5);
    ctx.draft.days = n; ctx.draft._date = dt.toISOString().slice(0, 10);
    renderWizard();
  };
  window.pickDate = function (v) {
    const from = new Date(new Date(Date.now() + 3 * 3600e3).toISOString().slice(0, 10) + "T00:00:00Z");
    const to = new Date(v + "T00:00:00Z");
    const days = Math.round((to - from) / 864e5);
    ctx.draft.days = days; ctx.draft._date = v;
    renderWizard();
  };

  window.handleVideoFile = function (input) {
    const f = input.files && input.files[0];
    if (!f) return;
    if (f.size > MAX_VIDEO_BYTES) { err("Видео слишком большое (максимум 20 МБ) — выбери покороче или в меньшем качестве."); input.value = ""; return; }
    if (ctx.draft.videoPreviewUrl) URL.revokeObjectURL(ctx.draft.videoPreviewUrl);
    ctx.draft.videoFile = f;
    ctx.draft.videoPreviewUrl = URL.createObjectURL(f);
    renderWizard();
  };

  window.pickStake = function (n) {
    ctx.draft.stake = n;
    const input = document.getElementById("f-stake");
    if (input) input.value = n || "";
    const note = document.getElementById("stake-note");
    if (note) note.textContent = n ? n + " ⭐ будет списано при подтверждении." : "Пока без ставки — только слово.";
  };
  window.onStakeInput = function (v) {
    const n = parseInt(v, 10);
    ctx.draft.stake = Number.isFinite(n) && n > 0 ? Math.min(n, 2500) : 0;
    const note = document.getElementById("stake-note");
    if (note) note.textContent = ctx.draft.stake ? ctx.draft.stake + " ⭐ будет списано при подтверждении." : "Пока без ставки — только слово.";
  };

  function err(msg) { const e = document.getElementById("f-err"); if (e) e.textContent = msg; }

  window.wizBack = function () { ctx.step--; renderWizard(); };

  window.wizNext = async function () {
    const d = ctx.draft;
    const name = curName();
    if (name === "mode" && !d.mode) return err("Выбери вариант.");
    if (name === "type" && !d.type) return err("Выбери вариант.");
    if (name === "goal") {
      const v = document.getElementById("f-goal").value.trim();
      if (!v) return err("Напиши цель.");
      if (d.type !== "quit" && !/\d/.test(v)) return err("Добавь цифру или дату — как поймём, что дошёл?");
      d.goal = v;
    }
    if (name === "pointA") {
      const v = document.getElementById("f-a").value.trim();
      if (!v) return err("Опиши, где ты сейчас.");
      d.point_a = v;
    }
    if (name === "pointB") {
      const v = document.getElementById("f-b").value.trim();
      if (!v) return err("Напиши финиш.");
      d.point_b = v;
    }
    if (name === "duration") {
      if (!d.days || d.days < 1 || d.days > 365) return err("Выбери срок от 1 до 365 дней.");
    }
    if (name === "witness") {
      const v = document.getElementById("f-w").value.trim();
      if (!v.startsWith("@")) return err("Начни с @, например @ivanov.");
      d.witness = v;
    }
    if (name === "video") {
      if (!d.videoFile) return err("Прикрепи видео — без него слово не считается.");
    }
    if (name === "review") { return submitCreate(); }
    ctx.step++;
    renderWizard();
  };

  async function submitCreate() {
    const app = document.getElementById("app");
    app.innerHTML = emptyMsg("Публикую слово…");
    try {
      const d = ctx.draft;
      const fd = new FormData();
      fd.append("draft", JSON.stringify({
        mode: d.mode, type: d.type, goal: d.goal, point_a: d.point_a, point_b: d.point_b,
        days: d.days, witness: d.witness || null, stake: d.stake || 0,
      }));
      fd.append("video", d.videoFile, d.videoFile.name || "video.mp4");
      const r = await api("/create", { method: "POST", body: fd });
      const data = await r.json();
      if (!r.ok) {
        app.innerHTML = emptyMsg("Не получилось (" + (data.error || "ошибка") + "). Вернись и попробуй снова.") +
          '<button onclick="renderWizard()">Назад к форме</button>';
        return;
      }
      if (data.invoice_link) { openStakeInvoice(data.invoice_link, data.bet_id); }
      else { finishWizard(data.bet_id, false, null); }
    } catch (e) {
      app.innerHTML = emptyMsg("Ошибка соединения. Попробуй ещё раз.") + '<button onclick="renderWizard()">Назад к форме</button>';
    }
  }

  window.openStakeInvoice = function (link, betId) {
    const app = document.getElementById("app");
    app.innerHTML = emptyMsg("Открываю оплату…");
    if (!tg || typeof tg.openInvoice !== "function") { finishWizard(betId, false, "unsupported"); return; }
    tg.openInvoice(link, function (status) { finishWizard(betId, status === "paid", status); });
  };

  function finishWizard(betId, paid, status) {
    const app = document.getElementById("app");
    let note = "";
    if (paid) note = '<div class="muted" style="text-align:center;margin-bottom:12px">⭐ Ставка оплачена.</div>';
    else if (status && status !== "unsupported") note = '<div class="muted" style="text-align:center;margin-bottom:12px">Оплата не завершена — можно попробовать снова из карточки ставки.</div>';
    app.innerHTML =
      '<div class="card" style="text-align:center"><div style="font-size:40px;margin-bottom:8px">🎬</div>' +
      '<div style="font-size:17px;margin-bottom:6px">Слово дано</div>' +
      '<div class="muted">Карточка #' + betId + " создана" + (ctx.draft.mode === "public" ? " и опубликована в группе." : ".") + "</div></div>" +
      note +
      '<button onclick="goToPersonaAfterCreate(' + betId + ')">Выбрать персонажа</button>' +
      '<button class="btn-secondary" onclick="reloadAndHome()">К списку ставок</button>';
  }

  window.goToPersonaAfterCreate = async function (betId) {
    await refreshStatus();
    ctx.selectedBetId = betId;
    renderBetDetail();
  };
  window.reloadAndHome = async function () {
    await refreshStatus();
    renderHome();
  };

  boot();
</script>
</body>
</html>
